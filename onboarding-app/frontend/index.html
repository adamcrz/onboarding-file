<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compliance & Onboarding Portal</title>
  <meta name="description" content="Secure multi-party compliance and client onboarding management portal for financial institutions." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
      <div class="login-bg">
        <div class="login-orb login-orb-1"></div>
        <div class="login-orb login-orb-2"></div>
        <div class="login-orb login-orb-3"></div>
      </div>
      <div class="login-container">
        <div class="login-card">
          <div class="login-logo">
            <img
              class="company-logo login-company-logo"
              src="assets/logo.png"
              alt="Tramondo Investment Partners logo"
            />
          </div>
          <!-- Auth panel — fully rendered by JS (renderAuthPanel) -->
          <div id="auth-panel"></div>
        </div>
      </div>
    </div>

    <!-- Main App Shell -->
    <div id="main-screen" class="screen">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <img
              class="company-logo sidebar-company-logo"
              src="assets/logo.png"
              alt="Tramondo Investment Partners logo"
            />
          </div>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav">
          <!-- Populated by JS based on role -->
        </nav>

        <div class="sidebar-footer">
          <div class="sidebar-user" id="sidebar-user">
            <div class="user-avatar" id="user-avatar-sidebar">B</div>
            <div class="user-info">
              <span class="user-name" id="user-name-sidebar">Bank Admin</span>
              <span class="user-role" id="user-role-sidebar">Administrator</span>
            </div>
          </div>
          <button class="btn-logout" onclick="logout()" title="Logout">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Top Bar -->
        <header class="topbar">
          <div class="topbar-left">
            <button class="sidebar-toggle" onclick="toggleSidebar()" id="sidebar-toggle">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <h2 class="topbar-title" id="topbar-title">Dashboard</h2>
          </div>
          <div class="topbar-right">
            <div class="topbar-role-badge" id="topbar-role-badge">Bank</div>
            <button class="notif-btn" id="notif-btn" onclick="toggleNotifications()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
              <span class="notif-badge" id="notif-badge">3</span>
            </button>
            <div class="notification-dropdown" id="notif-dropdown"></div>
          </div>
        </header>

        <!-- Page Content -->
        <div class="page-content" id="page-content">
          <!-- Populated by JS -->
        </div>
      </main>
    </div>
  </div>

  <!-- Document Viewer Modal -->
  <div class="modal-overlay" id="doc-modal" onclick="closeDocModal(event)">
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="doc-modal-title">Document Viewer</h3>
        <button class="modal-close" onclick="closeDocModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="modal-body" id="doc-modal-body">
      </div>
      <div class="modal-footer" id="doc-modal-footer">
      </div>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toast-container"></div>

  <!-- api.js must load BEFORE app.js -->
  <script src="api.js"></script>
  <script src="app.js"></script>

</body>
</html>
